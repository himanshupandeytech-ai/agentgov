# NIST AI Risk Management Framework (AI RMF 1.0) - reference slice.
# Source: NIST AI 100-1, https://nvlpubs.nist.gov/nistpubs/ai/nist.ai.100-1.pdf
#         Playbook, https://airc.nist.gov/AI_RMF_Knowledge_Base/Playbook
# License: U.S. Government work - public domain. Free to reuse.
#
# Curated slice only - the subcategories referenced by risk_patterns.yaml.
# Full ingestion of the Playbook is the later corpus-expansion phase.

framework: "NIST AI RMF 1.0"
functions:
  GOVERN: "Cultivate and maintain a culture of risk management; policies, accountability, and oversight."
  MAP: "Establish context; identify and frame risks for a given AI system and use case."
  MEASURE: "Analyze, assess, benchmark, and monitor AI risks and trustworthiness characteristics."
  MANAGE: "Allocate resources to and act on mapped and measured risks; respond, recover, communicate."

subcategories:
  GOVERN-1.1: "Legal and regulatory requirements involving AI are understood, managed, and documented."
  GOVERN-1.2: "The characteristics of trustworthy AI are integrated into organizational policies, processes, and procedures."
  GOVERN-1.4: "The risk management process and its outcomes are established through transparent policies, procedures, and documentation."
  GOVERN-2.1: "Roles and responsibilities and lines of communication related to mapping, measuring, and managing AI risks are documented and clear."
  GOVERN-4.1: "Organizational policies foster a critical thinking and safety-first mindset in the design, development, and deployment of AI."
  MAP-1.1: "Intended purpose, context of use, and assumptions about the AI system are documented."
  MAP-2.3: "Scientific integrity and TEVV (test, evaluation, verification, validation) considerations are identified and documented."
  MAP-4.1: "Approaches for mapping third-party (vendor, tool, data) risks are in place."
  MEASURE-2.3: "AI system performance or assurance criteria are measured qualitatively or quantitatively and documented."
  MEASURE-2.6: "The AI system is evaluated regularly for safety risks, including potential for unanticipated, unsafe, or emergent behavior."
  MEASURE-2.7: "AI system security and resilience - e.g., to adversarial attacks - are evaluated and documented."
  MEASURE-2.11: "Fairness and bias - as identified in the MAP function - are evaluated and results are documented."
  MEASURE-3.1: "Approaches and metrics to track AI risks over time are in place and applied."
  MANAGE-1.3: "Responses to identified and measured AI risks are prioritized, planned, and documented."
  MANAGE-2.3: "Mechanisms are in place and applied to supervise, override, or disengage AI system actions when warranted."
  MANAGE-2.4: "Mechanisms are in place and applied to sustain the value of deployed AI, including options to deactivate or decommission."
  MANAGE-4.1: "Post-deployment AI system monitoring plans are implemented, including mechanisms for capturing and responding to incidents."
